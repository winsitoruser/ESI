name: SIMESI CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: bedagang_dev
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      
      - name: Lint check
        run: npm run lint || true
      
      - name: Run migrations
        run: npx sequelize-cli db:migrate
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: bedagang_dev
          DB_USER: postgres
          DB_PASSWORD: postgres
      
      - name: Build
        run: npm run build
      
      - name: Run tests
        run: npm run test || true
