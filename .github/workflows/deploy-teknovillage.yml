# =============================================================================
# Bedagang ERP — Auto-Deploy to Teknovillage Production
# =============================================================================
# Trigger: push to New-Backend-Nainerp
# Target:  Teknovillage VPS (202.10.36.37)
# Stack:   Next.js (PM2) + PostgreSQL + Nginx + Redis
#
# Secrets required in GitHub repository:
#   SSH_PRIVATE_KEY     — private key for bedagang deploy user
#   SSH_HOST            — Teknovillage IP (202.10.36.37)
#   SSH_USER            — deploy user (bedagang)
#   APP_DIR             — /var/www/bedagang/app
# =============================================================================

name: Deploy to Teknovillage Production

on:
  push:
    branches: [New-Backend-Nainerp]
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Confirm deployment to production'
        required: true
        default: 'no'
        type: choice
        options:
          - 'no'
          - 'yes'

env:
  NODE_VERSION: '20'

concurrency:
  group: teknovillage-production
  cancel-in-progress: false

jobs:
  # ──── Job 1: CI — Lint, Test, Build ──────────────────────────────
  ci:
    name: CI — Lint & Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-optional
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Lint check
        run: npm run lint
        continue-on-error: true

      - name: TypeScript check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build check
        run: npm run build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          NODE_ENV: production

  # ──── Job 2: Deploy to Teknovillage ──────────────────────────────
  deploy:
    name: Deploy to Teknovillage VPS
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'yes'
      || github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via SSH
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'SSHEOF'
            set -e

            echo "=== Bedagang Deploy: $(date -u '+%Y-%m-%dT%H:%M:%SZ') ==="

            # 1. Pull latest code
            echo "[1/6] Pulling latest code..."
            cd /var/www/bedagang/app
            git fetch origin New-Backend-Nainerp
            git reset --hard origin/New-Backend-Nainerp

            # 2. Install dependencies
            echo "[2/6] Installing dependencies..."
            export NODE_OPTIONS='--max-old-space-size=4096'
            npm ci --legacy-peer-deps --no-optional 2>&1

            # 3. Build application
            echo "[3/6] Building application..."
            npm run build 2>&1

            # 4. Run migrations
            echo "[4/6] Running database migrations..."
            npm run db:migrate 2>&1 || echo "WARN: Migration issues -- check manually"

            # 5. Restart PM2
            echo "[5/6] Restarting PM2 processes..."
            pm2 startOrGracefulReload /var/www/bedagang/ecosystem.config.js 2>&1
            pm2 save 2>&1

            # 6. Health check
            echo "[6/6] Running health checks..."
            sleep 5
            for port in 3001 3002; do
              if curl -sf -o /dev/null "http://127.0.0.1:${port}/api/health" 2>/dev/null; then
                echo "  OK Port ${port} -- HEALTHY"
              else
                echo "  WARN Port ${port} -- Health check failed"
              fi
            done

            pm2 list 2>&1
            echo "=== Deploy Complete: $(date -u '+%Y-%m-%dT%H:%M:%SZ') ==="
          SSHEOF

      - name: Log deployment
        run: |
          echo "Deploy to Teknovillage complete at $(date -u)"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
