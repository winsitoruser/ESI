name: Humanify SaaS Gate

# CI gate for Humanify SaaS — fails PR/main if critical modules don't typecheck.
on:
  push:
    branches: [main, develop]
    paths:
      - 'lib/saas/**'
      - 'pages/api/humanify/**'
      - 'pages/api/v1/**'
      - 'pages/humanify/**'
      - 'pages/platform/**'
      - 'package.json'
      - '.github/workflows/humanify-saas-gate.yml'
  pull_request:
    branches: [main]
    paths:
      - 'lib/saas/**'
      - 'pages/api/humanify/**'
      - 'pages/api/v1/**'
      - 'pages/humanify/**'
      - 'pages/platform/**'

jobs:
  saas-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Typecheck SaaS surface (tsc — no emit)
        run: |
          npx tsc --noEmit --pretty false 2>&1 | tee /tmp/tsc.log || true
          # Fail only if errors touch Humanify SaaS paths (repo has legacy noise)
          if rg -n "error TS" /tmp/tsc.log | rg -q "lib/saas/|pages/api/humanify/|pages/api/v1/|pages/humanify/|pages/platform/"; then
            echo "::error::TypeScript errors in Humanify SaaS paths"
            rg -n "error TS" /tmp/tsc.log | rg "lib/saas/|pages/api/humanify/|pages/api/v1/|pages/humanify/|pages/platform/" || true
            exit 1
          fi
          echo "✓ No SaaS-path TypeScript errors"

      - name: OpenAPI + v1 route smoke (static)
        run: |
          test -f pages/api/v1/employees.ts
          test -f pages/api/v1/leaves.ts
          test -f pages/api/v1/attendance/summary.ts
          test -f pages/api/v1/openapi.ts
          test -f lib/saas/admin-audit.ts
          test -f lib/saas/humanify-billing.ts
          test -f e2e/humanify-welcome-login.spec.ts
          test -f playwright.config.ts
          test -f scripts/smoke-test-payroll-golden.js
          test -f scripts/smoke-test-saas-idor-hr-modules.js
          test -f scripts/migrate-humanify-rls.js
          test -f scripts/smoke-test-saas-sso-acs-e2e.js
          test -f scripts/smoke-test-saas-idor-batch11.js
          test -f scripts/smoke-test-saas-payroll-depth.js
          test -f scripts/ensure-humanify-redis.sh
          test -f docs/humanify-sso-idp-runbook.md
          test -f scripts/enable-humanify-rls-request-bound.sh
          test -f lib/saas/candidate-jwt.ts
          test -f lib/observability/persist.ts
          test -f pages/api/humanify/sso/acs.ts
          test -f scripts/run-saas-ci-subset.sh
          test -f lib/humanify/lms-surface.ts
          test -f pages/api/platform/obs-alerts.ts
          test -f components/humanify/HrisEmptyState.tsx
          echo "✓ Required SaaS files present (P2 LMS/obs/CI)"

      - name: Install Playwright Chromium (for optional prod smoke)
        if: ${{ secrets.SMOKE_BASE_URL != '' }}
        run: npx playwright install --with-deps chromium

      - name: Playwright welcome→login (against SMOKE_BASE_URL)
        if: ${{ secrets.SMOKE_BASE_URL != '' }}
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.SMOKE_BASE_URL }}
        run: npx playwright test e2e/humanify-welcome-login.spec.ts

      - name: Payroll golden smoke (against SMOKE_BASE_URL)
        if: ${{ secrets.SMOKE_BASE_URL != '' }}
        env:
          SMOKE_BASE_URL: ${{ secrets.SMOKE_BASE_URL }}
          SMOKE_EMAIL: ${{ secrets.SMOKE_EMAIL }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
        run: node scripts/smoke-test-payroll-golden.js

      - name: SaaS critical regression subset (against SMOKE_BASE_URL)
        if: ${{ secrets.SMOKE_BASE_URL != '' }}
        env:
          SMOKE_BASE_URL: ${{ secrets.SMOKE_BASE_URL }}
          SMOKE_EMAIL: ${{ secrets.SMOKE_EMAIL }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
        run: bash scripts/run-saas-ci-subset.sh
