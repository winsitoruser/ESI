name: Humanify SaaS Gate

# CI gate for Humanify SaaS — fails PR/main if critical modules don't typecheck.
on:
  push:
    branches: [main, develop]
    paths:
      - 'lib/saas/**'
      - 'pages/api/humanify/**'
      - 'pages/api/v1/**'
      - 'pages/humanify/**'
      - 'pages/platform/**'
      - 'package.json'
      - '.github/workflows/humanify-saas-gate.yml'
  pull_request:
    branches: [main]
    paths:
      - 'lib/saas/**'
      - 'pages/api/humanify/**'
      - 'pages/api/v1/**'
      - 'pages/humanify/**'
      - 'pages/platform/**'

jobs:
  saas-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Typecheck SaaS surface (tsc — no emit)
        run: |
          npx tsc --noEmit --pretty false 2>&1 | tee /tmp/tsc.log || true
          # Fail only if errors touch Humanify SaaS paths (repo has legacy noise)
          if rg -n "error TS" /tmp/tsc.log | rg -q "lib/saas/|pages/api/humanify/|pages/api/v1/|pages/humanify/|pages/platform/"; then
            echo "::error::TypeScript errors in Humanify SaaS paths"
            rg -n "error TS" /tmp/tsc.log | rg "lib/saas/|pages/api/humanify/|pages/api/v1/|pages/humanify/|pages/platform/" || true
            exit 1
          fi
          echo "✓ No SaaS-path TypeScript errors"

      - name: OpenAPI + v1 route smoke (static)
        run: |
          test -f pages/api/v1/employees.ts
          test -f pages/api/v1/leaves.ts
          test -f pages/api/v1/attendance/summary.ts
          test -f pages/api/v1/openapi.ts
          test -f lib/saas/admin-audit.ts
          test -f lib/saas/humanify-billing.ts
          test -f e2e/humanify-welcome-login.spec.ts
          test -f playwright.config.ts
          test -f scripts/smoke-test-payroll-golden.js
          test -f scripts/smoke-test-saas-idor-hr-modules.js
          test -f scripts/migrate-humanify-rls.js
          test -f scripts/smoke-test-saas-sso-acs-e2e.js
          test -f scripts/smoke-test-saas-idor-batch11.js
          test -f scripts/smoke-test-saas-payroll-depth.js
          test -f scripts/ensure-humanify-redis.sh
          test -f docs/humanify-sso-idp-runbook.md
          test -f scripts/enable-humanify-rls-request-bound.sh
          test -f lib/saas/candidate-jwt.ts
          test -f lib/observability/persist.ts
          test -f pages/api/humanify/sso/acs.ts
          test -f scripts/run-saas-ci-subset.sh
          test -f lib/humanify/lms-surface.ts
          test -f pages/api/platform/obs-alerts.ts
          test -f components/humanify/HrisEmptyState.tsx
          echo "✓ Required SaaS files present (P2 LMS/obs/CI)"

      - name: Unit smokes (no network — always required)
        run: |
          npm run smoke:api-error
          npm run smoke:sidebar-persona
          npm run smoke:payroll-fiscal
          npm run smoke:mock-guard
          npm run smoke:payslip-gate
          npm run smoke:device-sync-idempotency
          npm run smoke:letter-merge
          npm run smoke:wave12
          npm run smoke:wave14
          npm run smoke:wave15
          npm run smoke:wave16
          npm run smoke:wave17
          npm run smoke:wave18
          npm run smoke:wave19
          npm run smoke:wave20
          npm run smoke:wave21
          npm run smoke:wave22
          npm run smoke:wave23
          npm run smoke:wave24
          npm run smoke:wave25
          npm run smoke:wave26
          npm run smoke:wave27
          npm run smoke:rls-lab
          npm run check:uptime-external
          npm run smoke:mock-audit
          SMOKE_ALLOW_MISSING_BACKUP=true npm run check:backup-freshness
          test -f lib/saas/tenant-request-bound.ts
          test -f lib/saas/backup-freshness.ts
          test -f lib/saas/scorecard-last.ts
          test -f lib/saas/digest-last.ts
          test -f lib/saas/soft-deactivate-last.ts
          test -f lib/saas/uptime-last.ts
          test -f lib/hris/policy-ack.ts
          test -f lib/saas/billing-webhook-idempotency.ts
          test -f lib/hris/payslip-view-gate.ts
          test -f lib/hris/recruitment-webhook-idempotency.ts
          test -f lib/hris/letter-merge-fields.ts
          test -f lib/hris/action-inbox-snooze.ts
          test -f lib/hris/privy-webhook.ts
          test -f lib/hris/document-compliance-summary.ts
          test -f lib/hris/attendance-bulk-correct.ts
          test -f lib/hris/partner-leads.ts
          test -f e2e/humanify-partners-ui.spec.ts
          test -f e2e/humanify-signup-ref-ui.spec.ts
          test -f e2e/humanify-signup-ui.spec.ts
          test -f e2e/humanify-forgot-password-ui.spec.ts
          test -f e2e/humanify-reset-password-ui.spec.ts
          test -f e2e/humanify-careers-ui.spec.ts
          test -f e2e/humanify-roi-calculator-ui.spec.ts
          test -f e2e/humanify-join-ui.spec.ts
          test -f e2e/humanify-verify-email-ui.spec.ts
          test -f e2e/humanify-seo-public-ui.spec.ts
          test -f scripts/check-humanify-uptime-external.js
          test -f scripts/run-humanify-doc-expiry-soft-deactivate.js
          test -f scripts/ensure-humanify-demo-partner.js
          test -f docs/humanify-ga-scope.md
          test -f docs/humanify-rls-strict-staging.md
          test -f docs/humanify-doc-retention.md
          test -f docs/humanify-doc-storage-s3.md
          test -f docs/humanify-esign-privy-ga.md
          test -f docs/humanify-partner-channel.md
          test -f docs/humanify-bounded-context.md
          echo "✓ Unit smokes + Wave artifacts present"

      - name: Install Playwright Chromium (for optional prod smoke)
        if: ${{ secrets.SMOKE_BASE_URL != '' }}
        run: npx playwright install --with-deps chromium

      - name: Playwright welcome→login (against SMOKE_BASE_URL)
        if: ${{ secrets.SMOKE_BASE_URL != '' }}
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.SMOKE_BASE_URL }}
        run: npx playwright test e2e/humanify-welcome-login.spec.ts

      - name: Payroll golden smoke (against SMOKE_BASE_URL)
        if: ${{ secrets.SMOKE_BASE_URL != '' }}
        env:
          SMOKE_BASE_URL: ${{ secrets.SMOKE_BASE_URL }}
          SMOKE_EMAIL: ${{ secrets.SMOKE_EMAIL }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
        run: node scripts/smoke-test-payroll-golden.js

      - name: SaaS critical regression subset (against SMOKE_BASE_URL)
        if: ${{ secrets.SMOKE_BASE_URL != '' }}
        env:
          SMOKE_BASE_URL: ${{ secrets.SMOKE_BASE_URL }}
          SMOKE_EMAIL: ${{ secrets.SMOKE_EMAIL }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
        run: bash scripts/run-saas-ci-subset.sh
