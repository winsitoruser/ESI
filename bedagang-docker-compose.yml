# ===========================================
# Bedagang ERP — Production Docker Compose
# ===========================================
# Services:
#   app-admin  → Next.js Admin/HQ      :3001
#   app-store  → Next.js Store/POS     :3002
#   api        → Backend API (Express) :4000
#   db         → PostgreSQL (bedagang_dev)
#   redis      → Redis (internal only)
# ===========================================

services:
  # ─── Next.js Admin / HQ ─────────────────
  app-admin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bedagang-admin
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - NEXT_PUBLIC_API_URL=http://bedagang.local/api/v1
      - NEXTAUTH_URL=http://bedagang.local
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/bedagang_dev
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=bedagang_dev
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=bedagang_dev
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - SESSION_SECRET=${SESSION_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOG_LEVEL=info
      - DEFAULT_CURRENCY=IDR
      - DEFAULT_TIMEZONE=Asia/Jakarta
      - DEFAULT_LANGUAGE=id
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - bedagang_uploads:/app/public/uploads
      - bedagang_logs_admin:/app/logs
    networks:
      - bedagang-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ─── Next.js Store / POS ────────────────
  app-store:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bedagang-store
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
      - NEXT_PUBLIC_API_URL=http://bedagang.local/api/v1
      - NEXTAUTH_URL=http://bedagang.local
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/bedagang_dev
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=bedagang_dev
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=bedagang_dev
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - SESSION_SECRET=${SESSION_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOG_LEVEL=info
      - DEFAULT_CURRENCY=IDR
      - DEFAULT_TIMEZONE=Asia/Jakarta
      - DEFAULT_LANGUAGE=id
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - bedagang_uploads:/app/public/uploads
      - bedagang_logs_store:/app/logs
    networks:
      - bedagang-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ─── Backend API (Express) ──────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bedagang-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - API_PREFIX=/api/v1
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=bedagang_dev
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_SSL=false
      - DB_POOL_MAX=20
      - DB_POOL_MIN=5
      - DB_POOL_ACQUIRE=30000
      - DB_POOL_IDLE=10000
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_REFRESH_EXPIRES_IN=30d
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - LOG_LEVEL=info
      - LOG_DIR=./logs
      - CORS_ORIGIN=http://bedagang.local,https://${DOMAIN}
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX_REQUESTS=100
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - bedagang_uploads:/app/uploads
      - bedagang_api_logs:/app/logs
    networks:
      - bedagang-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ─── PostgreSQL ─────────────────────────
  db:
    image: postgres:16-alpine
    container_name: bedagang-db
    restart: unless-stopped
    ports:
      # Internal only — no host port exposure in production
      # Use: expose: ["5432"] + network-only access
      - "5432"
    environment:
      POSTGRES_DB: bedagang_dev
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - bedagang_pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bedagang} -d bedagang_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - bedagang-network
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 256M

  # ─── Redis ──────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: bedagang-redis
    restart: unless-stopped
    ports:
      # Internal only — no host port exposure
      - "6379"
    command: >
      redis-server
      --save 60 1
      --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bedagang-network
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

# ─── Persistent Volumes ──────────────────
volumes:
  bedagang_pgdata:
    name: bedagang_pgdata
  bedagang_uploads:
    name: bedagang_uploads
  bedagang_api_logs:
    name: bedagang_api_logs
  bedagang_logs_admin:
    name: bedagang_logs_admin
  bedagang_logs_store:
    name: bedagang_logs_store

# ─── Internal Network ────────────────────
networks:
  bedagang-network:
    name: bedagang-network
    driver: bridge
